<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Studio - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .dark-glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen relative overflow-x-hidden">

    <div id="loginScreen" class="flex items-center justify-center min-h-screen absolute inset-0 z-50 bg-[#0f172a]">
        <div class="absolute w-72 h-72 bg-indigo-600 rounded-full mix-blend-screen filter blur-[100px] opacity-30"></div>
        <div class="dark-glass p-10 rounded-3xl shadow-2xl w-full max-w-sm relative z-10 text-center">
            <h2 class="text-3xl font-black mb-8 text-white tracking-tight">Studio<span class="text-indigo-500">Login</span></h2>
            <form id="loginForm" class="space-y-5">
                <input type="text" id="loginUser" placeholder="Username" class="w-full bg-slate-800/50 text-white px-5 py-4 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition border border-slate-700" required>
                <input type="password" id="loginPass" placeholder="Password" class="w-full bg-slate-800/50 text-white px-5 py-4 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition border border-slate-700" required>
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500 py-4 rounded-xl font-bold transition shadow-lg shadow-indigo-500/30 text-white">Unlock Dashboard</button>
            </form>
        </div>
    </div>

    <div id="mainDashboard" class="hidden max-w-6xl mx-auto p-6 md:p-10 relative z-10">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 dark-glass p-6 rounded-3xl shadow-xl">
            <div>
                <h1 class="text-3xl font-black text-white">Media <span class="text-indigo-400">Dashboard</span></h1>
                <p class="text-slate-400 mt-1">Sistem Terpusat Hosting Testimoni</p>
            </div>
            <button onclick="logout()" class="mt-4 md:mt-0 bg-red-500/10 hover:bg-red-500/20 text-red-400 px-6 py-3 rounded-xl font-bold transition border border-red-500/20">Keluar Sistem</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="dark-glass p-8 rounded-3xl shadow-xl h-fit">
                <h2 class="text-xl font-bold mb-6 text-white border-b border-slate-700 pb-4">Tambah Media Baru</h2>
                <form id="uploadForm" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wide">Pilih Pemilik Testi</label>
                        <select id="uploaderName" class="w-full bg-slate-800 text-white px-4 py-3 rounded-xl outline-none border border-slate-700 focus:border-indigo-500">
                            <option value="Ray">Ray</option>
                            <option value="Vald">Vald</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wide">URL Media (Catbox)</label>
                        <input type="url" id="imgUrl" placeholder="https://..." class="w-full bg-slate-800 text-white px-4 py-3 rounded-xl outline-none border border-slate-700 focus:border-indigo-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wide">Nama Produk</label>
                        <input type="text" id="prodName" class="w-full bg-slate-800 text-white px-4 py-3 rounded-xl outline-none border border-slate-700 focus:border-indigo-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wide">Harga</label>
                        <input type="number" id="price" class="w-full bg-slate-800 text-white px-4 py-3 rounded-xl outline-none border border-slate-700 focus:border-indigo-500" required>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition mt-4 shadow-lg text-white">Upload ke Database</button>
                </form>
            </div>

            <div class="lg:col-span-2 dark-glass p-8 rounded-3xl shadow-xl">
                <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                    <h2 class="text-xl font-bold text-white">Database Testimoni</h2>
                </div>
                <div id="adminTable" class="space-y-4 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>
        </div>
    </div>

    <script>
        // Cek Login
        if (localStorage.getItem('token')) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainDashboard').classList.remove('hidden');
            loadAdminData();
        }

        // Handle Login
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('loginUser').value,
                    password: document.getElementById('loginPass').value
                })
            });
            const data = await res.json();
            
            if (res.ok) {
                localStorage.setItem('token', data.token);
                location.reload();
            } else { Swal.fire('Ditolak', data.error, 'error'); }
        });

        function logout() { localStorage.clear(); location.reload(); }

        // Upload
        document.getElementById("uploadForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const payload = {
                uploadedBy: document.getElementById("uploaderName").value,
                imageUrl: document.getElementById("imgUrl").value,
                productName: document.getElementById("prodName").value,
                price: document.getElementById("price").value
            };

            const res = await fetch('/api/testi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                body: JSON.stringify(payload)
            });
            
            if (res.ok) {
                Swal.fire({icon: 'success', title: 'Media Terasip', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000});
                e.target.reset();
                loadAdminData();
            } else { Swal.fire('Error', 'Gagal upload bro', 'error'); }
        });

        // Load Data
        async function loadAdminData() {
            const res = await fetch(`/api/testi`);
            const data = await res.json();
            const container = document.getElementById("adminTable");
            container.innerHTML = "";

            if(data.length === 0) return container.innerHTML = `<p class="text-slate-500 text-center py-10 font-bold">Database Kosong</p>`;

            data.forEach(item => {
                container.innerHTML += `
                    <div class="flex flex-col sm:flex-row items-center justify-between bg-slate-800/80 p-5 rounded-2xl shadow-sm border border-slate-700/50 gap-4 hover:border-indigo-500/50 transition">
                        <div class="flex items-center gap-5 w-full">
                            <img src="${item.imageUrl}" class="w-20 h-20 object-cover rounded-xl shadow-md border border-slate-700">
                            <div class="flex-1">
                                <h4 class="font-bold text-white text-lg tracking-tight">${item.productName}</h4>
                                <div class="flex items-center gap-3 mt-1">
                                    <span class="bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded text-xs font-bold uppercase">${item.uploadedBy}</span>
                                    <span class="text-sm text-slate-400 font-bold">Rp ${item.price.toLocaleString('id-ID')}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <button onclick="editNama('${item._id}', '${item.productName}')" class="flex-1 sm:flex-none bg-slate-700 hover:bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm transition shadow-sm">Edit</button>
                            <button onclick="hapusTesti('${item._id}')" class="flex-1 sm:flex-none bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-5 py-2.5 rounded-xl font-bold text-sm transition shadow-sm border border-red-500/20 hover:border-red-500">Hapus</button>
                        </div>
                    </div>
                `;
            });
        }

        // Edit
        async function editNama(id, oldName) {
            const { value: newName } = await Swal.fire({
                title: 'Update Nama Produk',
                input: 'text',
                inputValue: oldName,
                showCancelButton: true,
                background: '#1e293b', color: '#fff'
            });

            if (newName && newName !== oldName) {
                await fetch(`/api/testi/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ productName: newName })
                });
                loadAdminData();
            }
        }

        // Hapus
        async function hapusTesti(id) {
            const result = await Swal.fire({
                title: 'Hapus Media?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                background: '#1e293b', color: '#fff'
            });

            if (result.isConfirmed) {
                await fetch(`/api/testi/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                loadAdminData();
            }
        }
    </script>
</body>
</html>
