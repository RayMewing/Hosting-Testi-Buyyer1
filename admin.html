<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; color: #f8fafc; }
        .glass-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden">

    <div id="loginScreen" class="flex items-center justify-center min-h-screen absolute inset-0 z-50 bg-[#030712]">
        <div class="glass-panel p-10 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-3xl font-extrabold mb-8 text-center">System<span class="text-indigo-500">Login</span></h2>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="loginUser" placeholder="Username" class="w-full bg-black/50 text-white px-5 py-4 rounded-xl border border-zinc-800 outline-none" required>
                <input type="password" id="loginPass" placeholder="Password" class="w-full bg-black/50 text-white px-5 py-4 rounded-xl border border-zinc-800 outline-none" required>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-xl font-bold transition">Masuk</button>
            </form>
        </div>
    </div>

    <div id="mainDashboard" class="hidden max-w-7xl mx-auto p-6 lg:p-10 relative z-10">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-extrabold">Command <span class="text-indigo-500">Center</span></h1>
            <button onclick="logout()" class="bg-red-500/10 text-red-400 px-6 py-2 rounded-full font-bold">Logout</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6 lg:col-span-1">
                
                <div class="glass-panel p-6 rounded-3xl relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-cyan-400"></div>
                    <h2 class="text-lg font-bold mb-4 text-white">Upload Media Testi</h2>
                    <form id="uploadForm" class="space-y-4">
                        <select id="uploaderName" class="w-full bg-black/50 px-4 py-3 rounded-xl border border-zinc-800 outline-none text-sm" required></select>
                        <input type="text" id="buyerName" placeholder="Nama Pembeli" class="w-full bg-black/50 px-4 py-3 rounded-xl border border-zinc-800 outline-none text-sm" required>
                        <input type="text" id="prodName" placeholder="Produk Yang Dibeli" class="w-full bg-black/50 px-4 py-3 rounded-xl border border-zinc-800 outline-none text-sm" required>
                        <input type="number" id="price" placeholder="Harga (Rp)" class="w-full bg-black/50 px-4 py-3 rounded-xl border border-zinc-800 outline-none text-sm" required>
                        
                        <div class="border-2 border-dashed border-zinc-700 p-6 rounded-xl text-center hover:border-indigo-500 transition cursor-pointer relative group">
                            <label class="absolute inset-0 z-10 w-full h-full cursor-pointer"><input type="file" id="imageFile" accept="image/*" class="hidden" required></label>
                            <span class="text-xs font-bold text-zinc-400">Pilih Foto Testi</span>
                            <p id="fileNameDisplay" class="text-xs text-indigo-400 mt-2 font-bold"></p>
                        </div>
                        <button type="submit" id="btnUpload" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition mt-2">Publish Data</button>
                    </form>
                </div>

                <div class="glass-panel p-6 rounded-3xl">
                    <h2 class="text-lg font-bold mb-4 text-white">Pengaturan Sistem</h2>
                    <form id="settingsForm" class="space-y-5">
                        <div class="p-4 bg-black/40 rounded-xl border border-zinc-800 space-y-3">
                            <p class="text-xs font-bold text-indigo-400 uppercase tracking-widest">Akun Admin</p>
                            <input type="text" id="setAdminUser" placeholder="Username Baru" class="w-full bg-black/50 px-3 py-2 rounded-lg border border-zinc-700 text-sm outline-none">
                            <input type="password" id="setAdminPass" placeholder="Password Baru" class="w-full bg-black/50 px-3 py-2 rounded-lg border border-zinc-700 text-sm outline-none">
                        </div>

                        <div class="p-4 bg-black/40 rounded-xl border border-zinc-800 space-y-3">
                            <p class="text-xs font-bold text-indigo-400 uppercase tracking-widest">Sosial Media</p>
                            
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="chkWaCh" class="w-4 h-4 rounded accent-indigo-500">
                                <input type="text" id="linkWaCh" placeholder="Link Saluran WA" class="w-full bg-black/50 px-3 py-2 rounded-lg border border-zinc-700 text-sm outline-none">
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="chkWaOw" class="w-4 h-4 rounded accent-indigo-500">
                                <input type="text" id="linkWaOw" placeholder="Link WA Owner" class="w-full bg-black/50 px-3 py-2 rounded-lg border border-zinc-700 text-sm outline-none">
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="chkTikTok" class="w-4 h-4 rounded accent-indigo-500">
                                <input type="text" id="linkTikTok" placeholder="Link TikTok" class="w-full bg-black/50 px-3 py-2 rounded-lg border border-zinc-700 text-sm outline-none">
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-zinc-800 hover:bg-zinc-700 py-3 rounded-xl font-bold transition text-sm">Simpan Pengaturan</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass-panel p-6 rounded-3xl">
                    <form id="ownerForm" class="flex gap-2">
                        <input type="text" id="newOwnerName" placeholder="Tambah Nama Tim / Owner" class="w-full bg-black/50 px-4 py-3 rounded-xl border border-zinc-800 outline-none text-sm" required>
                        <button type="submit" class="bg-indigo-600 px-6 rounded-xl font-bold">+</button>
                    </form>
                </div>

                <div class="glass-panel p-6 rounded-3xl">
                    <h2 class="text-xl font-bold text-white mb-6">Database Tersimpan</h2>
                    <div id="adminTable" class="space-y-3 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (token) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainDashboard').classList.remove('hidden');
            initDashboard();
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: document.getElementById('loginUser').value, password: document.getElementById('loginPass').value })
            });
            if (res.ok) { localStorage.setItem('token', (await res.json()).token); location.reload(); }
            else { Swal.fire({icon:'error', title:'Gagal Login', background:'#111827', color:'#fff'}); }
        });

        function logout() { localStorage.clear(); location.reload(); }

        function initDashboard() {
            loadOwners();
            loadAdminData();
        }

        document.getElementById('imageFile').addEventListener('change', e => {
            if(e.target.files[0]) document.getElementById('fileNameDisplay').innerText = e.target.files[0].name;
        });

        // LOAD & SAVE PENGATURAN
        document.getElementById("settingsForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const payload = {
                adminUser: document.getElementById('setAdminUser').value || undefined,
                adminPass: document.getElementById('setAdminPass').value || undefined,
                socials: {
                    waChannel: { link: document.getElementById('linkWaCh').value, active: document.getElementById('chkWaCh').checked },
                    waOwner: { link: document.getElementById('linkWaOw').value, active: document.getElementById('chkWaOw').checked },
                    tiktok: { link: document.getElementById('linkTikTok').value, active: document.getElementById('chkTikTok').checked }
                }
            };

            await fetch('/api/settings', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            Swal.fire({icon:'success', title:'Tersimpan!', toast:true, position:'top-end', showConfirmButton:false, timer:2000, background:'#111827', color:'#fff'});
        });

        // UPLOAD DATA BARU
        document.getElementById("uploadForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnUpload');
            btn.innerText = "Mengompres..."; btn.disabled = true;

            try {
                const imageFile = document.getElementById('imageFile').files[0];
                const compressedFile = await imageCompression(imageFile, { maxSizeMB: 0.5, maxWidthOrHeight: 800, useWebWorker: true });
                
                const reader = new FileReader();
                reader.readAsDataURL(compressedFile);
                reader.onloadend = async function() {
                    const payload = {
                        uploadedBy: document.getElementById("uploaderName").value,
                        buyerName: document.getElementById("buyerName").value,
                        productName: document.getElementById("prodName").value,
                        price: document.getElementById("price").value,
                        imageUrl: reader.result
                    };
                    await fetch('/api/testi', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(payload) });
                    Swal.fire({icon: 'success', title: 'Terupload!', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background:'#111827', color:'#fff'});
                    e.target.reset(); document.getElementById('fileNameDisplay').innerText = ''; loadAdminData();
                };
            } finally { btn.innerText = "Publish Data"; btn.disabled = false; }
        });

        async function loadOwners() {
            const data = await (await fetch('/api/owners')).json();
            const select = document.getElementById('uploaderName');
            select.innerHTML = '<option value="">Pilih Owner...</option>';
            data.forEach(o => select.innerHTML += `<option value="${o.name}">${o.name}</option>`);
        }
        document.getElementById('ownerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetch('/api/owners', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ name: document.getElementById('newOwnerName').value }) });
            document.getElementById('newOwnerName').value = ''; loadOwners();
        });

        async function loadAdminData() {
            const data = await (await fetch(`/api/testi`)).json();
            const container = document.getElementById("adminTable");
            container.innerHTML = "";
            data.forEach(item => {
                const date = new Date(item.date).toLocaleDateString('id-ID');
                container.innerHTML += `
                    <div class="flex items-center bg-black/40 p-4 rounded-2xl border border-zinc-800 gap-4 hover:border-indigo-500/50 transition">
                        <img src="${item.imageUrl}" class="w-16 h-16 object-cover rounded-xl border border-zinc-700">
                        <div class="flex-1">
                            <h4 class="font-bold text-white">${item.productName}</h4>
                            <p class="text-xs text-zinc-400 mt-1">Pembeli: <span class="text-white">${item.buyerName}</span> | Tgl: ${date}</p>
                            <p class="text-xs text-indigo-400 font-bold uppercase mt-1">${item.uploadedBy} • Rp ${item.price.toLocaleString('id-ID')}</p>
                        </div>
                        <button onclick="hapusTesti('${item._id}')" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl font-bold text-sm">Hapus</button>
                    </div>`;
            });
        }
        async function hapusTesti(id) { await fetch(`/api/testi/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); loadAdminData(); }
    </script>
</body>
</html>
