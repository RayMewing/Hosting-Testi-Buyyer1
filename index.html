<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Testimonials</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; color: #f9fafb; }
        .glass-header { background: rgba(3, 7, 18, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .card-premium { background: linear-gradient(145deg, #111827 0%, #030712 100%); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden selection:bg-indigo-500 selection:text-white">

    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-3xl h-[400px] bg-indigo-600/20 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <nav class="glass-header sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-tighter">TRUST<span class="text-indigo-500">PORTFOLIO</span></h1>
            <div class="flex gap-4">
                <div class="text-right">
                    <p class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Total Testimoni</p>
                    <p class="text-lg font-black text-white leading-tight" id="pubTotalTesti">0</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-20 relative z-10">
        <div class="text-center mb-20">
            <h2 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">
                Bukti <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">Kualitas</span> Kami.
            </h2>
            <p class="text-lg text-zinc-400 max-w-2xl mx-auto font-medium">Jejak rekam digital dan tingkat kepuasan pelanggan yang telah mempercayakan project mereka kepada tim kami.</p>
            
            <div class="mt-12 flex justify-center">
                <select id="filterAdmin" onchange="loadTesti()" class="appearance-none bg-zinc-900 border border-zinc-800 text-white px-8 py-4 rounded-full text-sm font-bold tracking-widest uppercase focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all cursor-pointer hover:bg-zinc-800">
                    <option value="semua">Semua Portofolio</option>
                    </select>
            </div>
        </div>

        <div id="testiContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
            <div class="col-span-full flex justify-center py-20">
                <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>
    </main>

    <script>
        async function initPublic() {
            // Ambil Statistik
            const statRes = await fetch('/api/stats');
            const statData = await statRes.json();
            document.getElementById('pubTotalTesti').innerText = statData.totalTesti;

            // Ambil Filter Owner
            const ownerRes = await fetch('/api/owners');
            const owners = await ownerRes.json();
            const select = document.getElementById('filterAdmin');
            select.innerHTML = '<option value="semua">Semua Portofolio</option>';
            owners.forEach(owner => {
                select.innerHTML += `<option value="${owner.name}">Portofolio ${owner.name}</option>`;
            });

            loadTesti();
        }

        async function loadTesti() {
            const admin = document.getElementById("filterAdmin").value;
            const container = document.getElementById("testiContainer");
            
            try {
                const res = await fetch(`/api/testi?admin=${admin}`);
                const data = await res.json();
                
                container.innerHTML = ""; 
                if(data.length === 0) return container.innerHTML = `<div class="col-span-full py-20 text-center"><p class="text-zinc-600 text-2xl font-bold">Belum ada portofolio di kategori ini.</p></div>`;

                data.forEach((item) => {
                    const date = new Date(item.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
                    container.innerHTML += `
                        <div class="card-premium rounded-3xl overflow-hidden group hover:-translate-y-2 transition-all duration-500 hover:shadow-2xl hover:shadow-indigo-500/20">
                            <div class="relative overflow-hidden aspect-[4/3]">
                                <img src="${item.imageUrl}" class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700 ease-in-out">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                                <div class="absolute bottom-4 left-4 bg-white/10 backdrop-blur-md px-4 py-2 rounded-full border border-white/10 text-xs font-bold uppercase tracking-wider text-white">
                                    By: ${item.uploadedBy}
                                </div>
                            </div>
                            <div class="p-8">
                                <p class="text-indigo-400 font-bold text-sm mb-2 tracking-widest uppercase">${date}</p>
                                <h3 class="text-2xl font-extrabold text-white mb-2 leading-tight">${item.productName}</h3>
                                <p class="text-zinc-400 font-semibold text-lg">Rp ${item.price.toLocaleString('id-ID')}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-500 text-center col-span-full">Gagal memuat server.</p>`;
            }
        }
        
        initPublic();
    </script>
</body>
</html>
