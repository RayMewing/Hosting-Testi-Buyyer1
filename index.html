<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimoni Pelanggan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        .bg-gradient-radial { background: radial-gradient(circle at top right, #e0e7ff, #f3f4f6); }
    </style>
</head>
<body class="bg-gradient-radial text-slate-800 font-sans antialiased min-h-screen relative overflow-x-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse z-0"></div>
    <div class="absolute top-[20%] right-[-10%] w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse z-0" style="animation-delay: 2s;"></div>

    <div class="max-w-7xl mx-auto px-6 py-20 relative z-10">
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-indigo-600 mb-6 drop-shadow-sm">
                Kepercayaan Pelanggan
            </h1>
            <p class="text-lg text-slate-600 max-w-2xl mx-auto font-medium">Koleksi testimoni dan bukti transaksi yang berhasil kami layani dengan sepenuh hati.</p>
            
            <div class="mt-10 flex justify-center">
                <select id="filterAdmin" onchange="loadTesti()" class="glass-card appearance-none w-64 px-6 py-4 rounded-2xl shadow-lg focus:outline-none focus:ring-4 focus:ring-indigo-300 transition duration-300 text-slate-700 font-bold text-center cursor-pointer">
                    <option value="semua">Semua Testimoni</option>
                    <option value="ray">Testimoni Ray</option>
                    <option value="vald">Testimoni Vald</option>
                </select>
            </div>
        </div>

        <div id="testiContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="col-span-full flex justify-center py-10">
                <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-indigo-600 border-opacity-50"></div>
            </div>
        </div>
    </div>

    <script>
        async function loadTesti() {
            const admin = document.getElementById("filterAdmin").value;
            const container = document.getElementById("testiContainer");
            
            try {
                const res = await fetch(`/api/testi?admin=${admin}`);
                const data = await res.json();
                
                container.innerHTML = ""; 
                if(data.length === 0) return container.innerHTML = `<p class="text-center col-span-full text-slate-500 text-xl font-medium mt-10">Belum ada testimoni.</p>`;

                data.forEach((item) => {
                    const date = new Date(item.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                    container.innerHTML += `
                        <div class="glass-card rounded-3xl overflow-hidden shadow-xl hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 group">
                            <div class="relative overflow-hidden">
                                <img src="${item.imageUrl}" class="w-full h-64 object-cover transform group-hover:scale-105 transition-transform duration-500">
                                <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-indigo-700 shadow-sm uppercase tracking-wider">
                                    ${item.uploadedBy}
                                </div>
                            </div>
                            <div class="p-6">
                                <h3 class="text-xl font-extrabold text-slate-800 mb-2 truncate">${item.productName}</h3>
                                <p class="text-indigo-600 font-black text-lg mb-4">Rp ${item.price.toLocaleString('id-ID')}</p>
                                <p class="text-xs text-slate-400 font-medium">${date}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-500 text-center col-span-full">Gagal memuat server.</p>`;
            }
        }
        loadTesti();
    </script>
</body>
</html>
